<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rob a Cat — 3D Game</title>
  <link rel="stylesheet" href="/game/game.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="loading">
    <p>Loading 3D world…</p>
  </div>

  <div id="connect-error">
    <h2>Connection Failed</h2>
    <p id="error-message">Could not join the game server.</p>
    <button type="button" class="btn btn-blue" id="btn-retry-exit">Return to Launcher</button>
  </div>

  <div id="game" class="game-layout">
    <canvas id="game-canvas"></canvas>

    <header class="hud overlay">
      <div class="hud-left">
        <div class="stat">
          <span class="stat-label">Player</span>
          <span class="stat-value" id="hud-username">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Money</span>
          <span class="stat-value money" id="hud-money">$0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Rebirth</span>
          <span class="stat-value" id="hud-rebirth">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Server</span>
          <span class="stat-value" id="hud-server">—</span>
        </div>
      </div>
      <div class="hud-right">
        <button type="button" class="btn btn-ghost" id="btn-exit">Exit</button>
      </div>
    </header>

    <aside class="players-panel overlay">
      <h2>Players Online</h2>
      <div id="players-list"></div>
    </aside>

    <footer class="actions-bar overlay">
      <span class="hint">Hold E near cats to pick up · Hold E near slots to place</span>
      <button type="button" class="btn btn-ghost" id="btn-rebirth">Rebirth</button>
    </footer>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="/game/game.js"></script>
</body>
</html>

# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect repo: https://github.com/DrakVortexx/robacat
services:
  - type: web
    name: robacat
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Add in Render dashboard (paste from Neon → Connection details):
      # - key: DATABASE_URL
      #   sync: false
